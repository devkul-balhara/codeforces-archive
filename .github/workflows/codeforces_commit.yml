name: Codeforces Auto-Sync

on:
  schedule:
    - cron: "*/15 * * * *"  # Runs automatically every 15 minutes
  workflow_dispatch:        # Allows you to click "Run workflow" manually

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TARGET_BRANCH: "main"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Fetch Script
        run: |
          python fetch_submissions.py

      - name: Push to Repository
        run: |
          git config --global user.name "devkul-balhara"
          git config --global user.email "devkulbalharaofficial@gmail.com"
          
          # Find all new (untracked) and modified files
          CHANGED_FILES=$(git ls-files --others --modified --exclude-standard)
          
          # Check if there are any files to commit
          if [ -n "$CHANGED_FILES" ]; then
            # Safely loop through each file, even if it has spaces
            git ls-files --others --modified --exclude-standard | while read -r FILE; do
              git add "$FILE"
              git commit -m "Automated sync: Added solution for $FILE"
            done
            
            # Pull any new changes from GitHub to prevent conflicts
            git pull --rebase origin ${{ env.TARGET_BRANCH }}
            
            # Push all the individual commits to GitHub at once
            git push origin ${{ env.TARGET_BRANCH }}
          else
            echo "No new submissions to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
