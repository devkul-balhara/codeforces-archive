name: Codeforces Auto-Sync

on:
  schedule:
    - cron: "*/15 * * * *"  # Runs automatically every 15 minutes
  workflow_dispatch:        # Allows you to click "Run workflow" manually

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TARGET_BRANCH: "main"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Fetch Script
        run: |
          python fetch_submissions.py

      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated sync: New Codeforces submissions" && git push origin ${{ env.TARGET_BRANCH }})
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}